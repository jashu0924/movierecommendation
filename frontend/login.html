<!doctype html>
<html>
  <head>
    <title>RJKN Movie Recommender - Login</title>
    <link rel="stylesheet" href="looks.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>

  <body>
    <div id="auth-section" class="auth-page">
      <div class="auth-card">
        <div class="brand">
          <span class="dot"></span>
          RJKN - MOVIE RECOMMENDER
        </div>

        <h1 id="auth-title">Welcome back.</h1>
        <p class="subtitle" id="auth-subtitle">
          Sign in to discover new releases and track films you love.
        </p>

        <div class="tabs">
          <button id="show-signin" class="active">Sign in</button>
          <button id="show-signup">Sign up</button>
        </div>

        <div id="signin-form">
          <label>Email</label>
          <input id="signin-email" type="email" placeholder="you@example.com" />

          <label>Password</label>
          <input id="signin-password" type="password" placeholder="••••••••" />

          <button id="test-signin-btn" class="main-btn">Sign in</button>

          <p class="switch-text">
            no account? <span id="bottom-signup">sign up</span>
          </p>
        </div>

        <div id="signup-form" style="display: none">
          <label>Email</label>
          <input id="signup-email" type="email" placeholder="you@example.com" />

          <label>Password</label>
          <input id="signup-password" type="password" placeholder="••••••••" />

          <button id="test-signup-btn" class="main-btn">Sign up</button>

          <p class="switch-text">
            already have an account? <span id="bottom-signin">sign in</span>
          </p>
        </div>
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
